name: Release

on:
  workflow_run:
    workflows: [CI]
    types:
      - completed
    branches:
      - main

jobs:
  build-binaries:
    name: Build binaries
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    strategy:
      matrix:
        include:
          - package: cli
            artifact: speedtest-cli
          - package: server
            artifact: speedtest-mcp

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build -w packages/${{ matrix.package }}

      - name: Install pkg
        run: npm install -g pkg

      - name: Build ${{ matrix.artifact }} binaries
        run: npm run pkg -w packages/${{ matrix.package }}

      - name: Upload Windows binary
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ env.UPLOAD_URL }}
          asset_path: packages/${{ matrix.package }}/dist-bin/${{ matrix.artifact }}-win-x64.exe
          asset_name: ${{ matrix.artifact }}-win-x64.exe
          asset_content_type: application/x-msdownload

      - name: Upload Linux binary
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ env.UPLOAD_URL }}
          asset_path: packages/${{ matrix.package }}/dist-bin/${{ matrix.artifact }}-linux-x64
          asset_name: ${{ matrix.artifact }}-linux-x64
          asset_content_type: application/octet-stream

      - name: Upload macOS binary
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ env.UPLOAD_URL }}
          asset_path: packages/${{ matrix.package }}/dist-bin/${{ matrix.artifact }}-macos-x64
          asset_name: ${{ matrix.artifact }}-macos-x64
          asset_content_type: application/octet-stream

  release:
    needs: build-binaries
    name: Create release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js environment
        uses: ./.github/actions/setup-project
        with:
          node-version: 24.x

      - name: Verify the integrity of provenance attestations and registry signatures for installed dependencies
        run: npm audit signatures

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
